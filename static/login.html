<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TigerChat · Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --border-hover: #484f58;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #2f81f7;
      --accent-hover: #58a6ff;
      --accent-glow: rgba(47, 129, 247, 0.15);
      --accent-glow-strong: rgba(47, 129, 247, 0.25);
      --error: #f85149;
      --error-bg: rgba(248, 81, 73, 0.1);
      --error-border: rgba(248, 81, 73, 0.4);
      --success: #3fb950;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* subtle grid pattern */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--surface2) 1px, transparent 1px),
        linear-gradient(90deg, var(--surface2) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow:
        0 0 0 1px rgba(47,129,247,0.05),
        0 20px 60px rgba(0, 0, 0, 0.5);
    }

    /* accent glow behind card */
    .card::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: 17px;
      background: linear-gradient(135deg, rgba(47,129,247,0.12), transparent 60%);
      pointer-events: none;
      z-index: -1;
    }

    /* ── Logo / Header ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      margin-bottom: 1.75rem;
    }
    .logo-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, #1a3a6e, #2f81f7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      flex-shrink: 0;
      box-shadow: 0 0 16px rgba(47,129,247,0.35);
    }
    .logo-text { line-height: 1.2; }
    .logo-text .name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
    }
    .logo-text .sub {
      font-size: 0.72rem;
      color: var(--muted);
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.35rem;
    }
    .subtitle {
      font-size: 0.83rem;
      color: var(--muted);
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    /* ── Form ── */
    .field { margin-bottom: 1.25rem; }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 0.5rem;
    }

    .input-wrap {
      position: relative;
    }
    .input-wrap .icon {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.95rem;
      pointer-events: none;
      opacity: 0.5;
    }
    .input-wrap .toggle-pw {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.25rem;
      border-radius: 4px;
      color: var(--muted);
      font-size: 0.85rem;
      transition: color 0.2s;
    }
    .input-wrap .toggle-pw:hover { color: var(--accent); }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 2.8rem 0.7rem 2.5rem;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    input::placeholder { color: var(--muted); opacity: 0.6; }

    /* ── Error message ── */
    .error-msg {
      display: none;
      align-items: center;
      gap: 0.5rem;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      font-size: 0.82rem;
      color: var(--error);
      margin-bottom: 1.25rem;
    }
    .error-msg.visible { display: flex; }

    /* ── Submit button ── */
    button[type="submit"] {
      width: 100%;
      padding: 0.75rem;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    button[type="submit"]:hover {
      background: var(--accent-hover);
      box-shadow: 0 0 20px var(--accent-glow-strong);
    }
    button[type="submit"]:active { transform: scale(0.98); }
    button[type="submit"]:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Footer ── */
    .card-footer {
      margin-top: 1.75rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .card-footer .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      flex-shrink: 0;
      box-shadow: 0 0 6px var(--success);
    }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    .spinner.visible { display: block; }
  </style>
</head>
<body>

  <div class="card">

    <div class="logo">
      <div class="logo-icon">🐯</div>
      <div class="logo-text">
        <div class="name">TigerChat</div>
        <div class="sub">RAG Intelligence Platform</div>
      </div>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Enter the access password to continue.</p>

    <div class="error-msg" id="errorMsg">
      <span>🔒</span>
      <span>Incorrect password. Please try again.</span>
    </div>

    <form id="loginForm" method="POST" action="/login">
      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <span class="icon">🔑</span>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter access password"
            autocomplete="current-password"
            autofocus
            required
          />
          <button type="button" class="toggle-pw" id="togglePw" title="Show / hide password" aria-label="Toggle password visibility">👁</button>
        </div>
      </div>

      <button type="submit" id="submitBtn">
        <span id="btnLabel">Sign in</span>
        <span class="spinner" id="spinner"></span>
      </button>
    </form>

    <div class="card-footer">
      <div class="dot"></div>
      <span>Secured · Internal access only</span>
    </div>

  </div>

  <script>
    // Show/hide password toggle
    const toggle = document.getElementById('togglePw');
    const pwInput = document.getElementById('password');
    toggle.addEventListener('click', () => {
      const isHidden = pwInput.type === 'password';
      pwInput.type = isHidden ? 'text' : 'password';
      toggle.textContent = isHidden ? '🙈' : '👁';
    });

    // Show error if redirected back with ?error=1
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('errorMsg').classList.add('visible');
      pwInput.focus();
      pwInput.select();
    }

    // Show spinner on submit
    document.getElementById('loginForm').addEventListener('submit', () => {
      const btn = document.getElementById('submitBtn');
      document.getElementById('btnLabel').textContent = 'Signing in…';
      document.getElementById('spinner').classList.add('visible');
      btn.disabled = true;
    });
  </script>

</body>
</html>
